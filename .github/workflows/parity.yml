name: Evaluator parity

# Cross-checks independent JS/Python implementations against shared corpora:
#   * the policy language — browser (website/src/lib/ltl.mjs) vs CLI (cli/ponens/trace.py)
#   * goal faithfulness   — viewer (viewer/core/faithfulness.mjs) vs CLI (cli/ponens/goals.py)
# The JS side must never report a verdict the CLI would contradict. See parity/README.md.

on:
  pull_request:
    paths:
      - "website/src/lib/ltl.mjs"
      - "viewer/core/faithfulness.mjs"
      - "cli/ponens/trace.py"
      - "cli/ponens/goals.py"
      - "cli/ponens/policy_compiler.py"
      - "parity/**"
      - ".github/workflows/parity.yml"
  push:
    branches: [main]
    paths:
      - "website/src/lib/ltl.mjs"
      - "viewer/core/faithfulness.mjs"
      - "cli/ponens/trace.py"
      - "cli/ponens/goals.py"
      - "cli/ponens/policy_compiler.py"
      - "parity/**"
      - ".github/workflows/parity.yml"

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install the CLI
        run: pip install -e ./cli
      - name: Check browser/CLI policy-evaluator parity
        run: python3 parity/check_parity.py
      - name: Check viewer/CLI goal-faithfulness parity
        run: python3 parity/check_faithfulness_parity.py
