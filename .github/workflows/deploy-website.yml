name: Deploy website

# Builds the Astro site in website/ and publishes it to GitHub Pages (ponens.dev).
# The build's prebuild step (scripts/prepare.mjs) syncs the gallery, spec, and
# viewer into the site, so a change in any of those also triggers a redeploy.

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "gallery/**"
      - "spec/**"
      - "viewer/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Install dependencies
        working-directory: website
        run: npm ci
      - name: Build site
        working-directory: website
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
